<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>QR Reader Test</title>
  <style>
    body{font-family:system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;margin:20px}
    .viewer-wrap{max-width:640px}
    video{width:100%;height:auto;background:#000}
    .controls{margin-top:8px}
  </style>
</head>
<body>
  <h1>QR Reader - Test Page</h1>
  <p>以下の「カメラ開始」を押して、カメラが起動するかを確認します。</p>

  <div class="viewer-wrap">
    <video id="qr-video" playsinline muted autoplay></video>
    <svg id="qr-overlay" aria-hidden="true"></svg>
    <div class="placeholder-msg" id="qr-placeholder">「カメラ開始」ボタンを押してください<br><small style="font-size:0.85em;opacity:0.8;">ブラウザから権限許可のダイアログが表示されます</small></div>
  </div>

  <div class="controls">
    <button class="btn" id="btn-start" type="button">カメラ開始</button>
    <button class="btn" id="btn-stop" type="button" disabled>停止</button>
    <div id="error-msg" style="color:#b00020;margin-top:8px;" hidden></div>
  </div>

  <!-- jsQR CDN + existing qr-reader script -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="/static/js/qr-reader.js" defer></script>
</body>
</html>
