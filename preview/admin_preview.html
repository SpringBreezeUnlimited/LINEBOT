<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Preview</title>
  <link rel="stylesheet" href="/static/css/types.css">
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/admin.css">
</head>

<body class="bg-light sidebar-layout">
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <span class="navbar-brand">
        <span class="responsive-label-full">管理パネル</span>
        <span class="responsive-label-short">管理パネル</span>
      </span>
      <div class="sidebar-nav-actions d-flex gap-2">
        <a href="#" class="btn btn-outline-light btn-sm"><img src="/static/img/code_reader_fill.svg"
            class="nav-icon nav-icon-type"> <span>種類</span></a>
        <a href="#" class="btn btn-outline-light btn-sm"><img src="/static/img/history_fill.svg"
            class="nav-icon nav-icon-history"> <span>ログ</span></a>
        <button class="btn btn-outline-light btn-sm">ログアウト</button>
        <a class="btn btn-outline-light btn-sm" href="#">お問い合わせ</a>
      </div>
    </div>
  </nav>
  <div class="container">
    <div>
      <div class="card-body">
        <div class="filter-sort-row">
          <div class="filter-sort-col">
            <label class="form-label">種類で絞り込み</label>
            <select class="form-select">
              <option>すべて</option>
            </select>
          </div>
          <div class="filter-sort-col">
            <label class="form-label">並べ替え</label>
            <select class="form-select">
              <option>番号</option>
            </select>
          </div>
        </div>
      </div>
    </div>
    <div class="mt-3">
      <div class="card-body p-0 admin-card-shell">
        <div class="admin-scroll">
          <div class="admin-card-list" id="active-rows">
            <article class="admin-reservation-card">
              <div class="admin-reservation-card__header">
                <div>
                  <div class="admin-reservation-card__label">番号</div>
                  <div class="admin-reservation-card__value">001</div>
                </div>
                <div class="admin-reservation-card__status"><span class="badge bg-warning text-dark">待機中</span></div>
              </div>
              <dl class="admin-reservation-card__meta">
                <div>
                  <dt>受付時刻</dt>
                  <dd>12:34</dd>
                </div>
                <div>
                  <dt>種類</dt>
                  <dd>会議</dd>
                </div>
              </dl>
              <div class="admin-reservation-card__actions"><button class="btn btn-sm btn-success">呼出</button></div>
            </article>
            <article class="admin-reservation-card">
              <div class="admin-reservation-card__header">
                <div>
                  <div class="admin-reservation-card__label">番号</div>
                  <div class="admin-reservation-card__value">002</div>
                </div>
                <div class="admin-reservation-card__status"><span class="badge bg-info">呼出中</span></div>
              </div>
              <dl class="admin-reservation-card__meta">
                <div>
                  <dt>受付時刻</dt>
                  <dd>12:40</dd>
                </div>
                <div>
                  <dt>種類</dt>
                  <dd>相談</dd>
                </div>
              </dl>
              <div class="admin-reservation-card__actions"><button class="btn btn-sm btn-primary">確認完了</button></div>
            </article>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
