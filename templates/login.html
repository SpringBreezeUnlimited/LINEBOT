<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('espresso-theme');
                if (theme === 'dark' || theme === 'light') {
                    document.documentElement.setAttribute('data-theme', theme);
                }
            } catch (e) {
                // no-op
            }
        })();
    </script>
    <title>ログイン - Espresso</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>
<body class="bg-light">
    <div class="theme-toggle-wrap">
        <button type="button" class="btn btn-outline-secondary btn-sm" data-theme-toggle aria-pressed="false">ダークモード</button>
    </div>
    <div class="container mt-5 login-container">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="text-center mb-4">Espresso 管理者ログイン</h3>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                {% if audit_admin_enabled %}
                <div class="alert alert-info">監査管理者パスワードでログインすると、ログイン履歴のみ確認できます。</div>
                {% endif %}
                <form method="POST">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
                    <div class="mb-3">
                        <label class="form-label">パスワード</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">ログイン</button>
                </form>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}" defer></script>
</body>
</html>
