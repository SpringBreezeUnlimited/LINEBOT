{% extends "base.html" %}

{% block title %}ログイン - Espresso{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="theme-toggle-wrap">
    <button type="button" class="btn btn-outline-secondary btn-sm" data-theme-toggle aria-pressed="false">テーマ切替</button>
</div>
<div class="container mt-5 login-container">
    <div class="card shadow">
        <div class="card-body">
            <h3 class="text-center mb-4">Espresso 管理者ログイン</h3>
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
                <div class="mb-3">
                    <label class="form-label">ログインID</label>
                    <input type="text" name="login_id" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">パスワード</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">ログイン</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
