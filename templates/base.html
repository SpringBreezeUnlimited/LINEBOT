<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token if csrf_token is defined else '' }}">
    <script>
        (function () {
            var theme = '';
            try {
                theme = localStorage.getItem('espresso-theme') || '';
            } catch (e) {
                theme = '';
            }
            if (theme === 'dark' || theme === 'light') {
                document.documentElement.setAttribute('data-theme', theme);
            } else {
                document.documentElement.setAttribute(
                    'data-theme',
                    window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
                );
            }
        })();
    </script>
    <title>{% block title %}Espresso{% endblock %}</title>
    {% block styles %}{% endblock %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>
<body class="{% block body_class %}bg-light{% endblock %}" {% block body_attrs %}{% endblock %}>
    {% block navbar %}{% endblock %}
    {% block content %}{% endblock %}
    <footer class="site-footer">
        <div class="container site-footer-inner">
            <small>「イラストレーション・アイコン素材」（デジタル庁）（https://www.digital.go.jp/policies/servicedesign/designsystem/Illustration_Icons）を元に、アイコン素材を独自に編集して提供しています。</small>
        </div>
    </footer>
    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}" defer></script>
    {% block scripts %}{% endblock %}
</body>
</html>
